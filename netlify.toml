[build]
  base = "frontend"
  command = "yarn install && yarn build"
  publish = "build"

[[redirects]]
  from = "/api/*"
  to = "https://privacycloak.in/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
  REACT_APP_BACKEND_URL = "https://privacycloak.in"
