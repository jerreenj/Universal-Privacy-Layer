<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <!-- Favicons — Privacy Cloak green cloaked-knight logo.
         Chromium/Firefox/Safari 14+ support SVG favicons natively.
         Older browsers fall back to /favicon.ico (we serve the SVG via
         the file share-contract; ICO fallback at /icons/icon.svg). -->
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/logo.svg" />
    <link rel="alternate icon" type="image/x-icon" href="%PUBLIC_URL%/icons/icon.svg" />
    <link rel="shortcut icon" href="%PUBLIC_URL%/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#050505" />
    <meta name="description" content="Privacy Cloak — Universal Privacy Layer. The HTTPS of Web3." />

    <!--
      Aggressive cache-control for the HTML shell. The deployed JS chunks
      are content-hashed (so they cache forever safely), but index.html
      itself must ALWAYS be re-fetched so the browser picks up the new
      chunk hashes after every redeploy. Without these headers, browsers
      (and CDNs) happily serve a stale index.html that references chunk
      hashes which no longer exist on the server — that produces the
      "ChunkLoadError" blank page after every deploy.
    -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Privacy Cloak" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icons/icon-192x192.png" />
    
    <!-- Splash screens for iOS -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;800&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <title>Privacy Cloak | Universal Privacy Layer</title>
    <!-- OpenGraph for social previews -->
    <meta property="og:title" content="Privacy Cloak — Universal Privacy Layer" />
    <meta property="og:description" content="Privacy-routed swaps, stealth addresses, ZK proofs, cross-chain splits. The HTTPS of Web3." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="%PUBLIC_URL%/logo.svg" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Privacy Cloak — Universal Privacy Layer" />
    <meta name="twitter:description" content="The HTTPS of Web3." />
    <meta name="twitter:image" content="%PUBLIC_URL%/logo.svg" />
    <!-- Version: 2026-07-05 — logo + scroll + lazy fixes -->
    <style>
      html, body { background-color: #050505; }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    
    <!--
      Service worker: KILLED.
      The previous SW (v1 cache-first, then v2 network-first) was the root
      cause of "blank page after deploy" — stale chunks in the browser's
      cache produced silent ChunkLoadErrors that unmounted the React tree.
      We no longer register a SW; instead we UNREGISTER any prior one so
      returning visitors are freed from whatever stale SW they picked up
      on an earlier visit. Plain HTTP cache (with our no-cache headers on
      index.html + content-hashed chunks) handles everything correctly.
    -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(r) {
              console.log('UPL: unregistering stale service worker', r.scope);
              r.unregister();
            });
          }).catch(function() {});
        });
      }
    </script>
  </body>
</html>
