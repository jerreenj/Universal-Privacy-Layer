name: Solana (SVM) build + test

on:
  push:
    branches: [main]
    paths:
      - "contracts/solana/**"
      - ".github/workflows/solana-build-test.yml"
  pull_request:
    paths:
      - "contracts/solana/**"
      - ".github/workflows/solana-build-test.yml"
  workflow_dispatch:

concurrency:
  group: solana-build-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: anchor build + test
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy

      - name: Install Solana CLI (Agave)
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: cargo install anchor-cli --version 0.30.1
        # Note: --locked omitted because the locked time crate version is
        # incompatible with Rust 1.88. Without --locked, cargo resolves a
        # newer compatible time crate.

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install test dependencies
        working-directory: contracts/solana
        run: npm install

      - name: Anchor build
        working-directory: contracts/solana
        run: anchor build

      # `anchor test`'s built-in validator spawn is fragile against the newer
      # Agave solana-test-validator: it often prints "Unable to get latest
      # blockhash. Test validator does not look started" in CI even though the
      # validator works fine standalone (anchor-foundation/anchor#1861,
      # otter-sec/anchor#3624 — startup_wait polling doesn't wait reliably).
      #
      # Fix: start solana-test-validator as a background process ourselves, poll
      # until its RPC responds, then run `anchor test --skip-local-validator`.
      # This is the standard CI workaround and avoids the timing race entirely.
      - name: Generate test wallet keypair
        run: solana-keygen new --no-bip39-passphrase --silent --force

      - name: Start local validator
        working-directory: contracts/solana
        run: |
          solana-test-validator \
            --reset \
            --bind-address 127.0.0.1 \
            --rpc-port 8899 \
            --quiet \
            > validator.log 2>&1 &
          echo $! > validator.pid
          # Poll the RPC until it answers (up to ~3 min for cold CI disks).
          for i in $(seq 1 90); do
            if curl -sf -X POST http://127.0.0.1:8899 \
                 -H 'content-type: application/json' \
                 -d '{"jsonrpc":"2.0","id":1,"method":"getHealth"}' \
                 | grep -q '"healthy"'; then
              echo "validator is healthy after ${i} polls"
              exit 0
            fi
            sleep 2
          done
          echo "::error::validator did not become healthy in time"
          cat validator.log
          exit 1

      - name: Anchor test (skip-local-validator)
        working-directory: contracts/solana
        # --skip-local-validator: anchor connects to the already-running
        # validator at the [provider] cluster (localnet → http://127.0.0.1:8899),
        # still performs its own program deploy from target/deploy/, then runs
        # the [scripts].test. This avoids the spawn-timing race.
        run: anchor test --skip-local-validator

      - name: Validator log on failure
        if: always()
        working-directory: contracts/solana
        run: cat validator.log || true
