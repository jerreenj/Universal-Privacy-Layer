name: Solana (SVM) build + test

on:
  push:
    branches: [main]
    paths:
      - "contracts/solana/**"
      - ".github/workflows/solana-build-test.yml"
  pull_request:
    paths:
      - "contracts/solana/**"
      - ".github/workflows/solana-build-test.yml"
  workflow_dispatch:

concurrency:
  group: solana-build-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: anchor build + test
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy

      - name: Install Solana CLI (Agave)
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: cargo install anchor-cli --version 0.30.1 --locked

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install test dependencies
        working-directory: contracts/solana
        run: npm install

      - name: Anchor build
        working-directory: contracts/solana
        run: anchor build

      - name: Anchor test
        working-directory: contracts/solana
        run: anchor test
