name: Solana (SVM) build + test

on:
  push:
    branches: [main]
    paths:
      - "contracts/solana/**"
      - ".github/workflows/solana-build-test.yml"
  pull_request:
    paths:
      - "contracts/solana/**"
      - ".github/workflows/solana-build-test.yml"
  workflow_dispatch:

concurrency:
  group: solana-build-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: anchor build + test
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy

      - name: Install Solana CLI (Agave)
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: cargo install anchor-cli --version 0.30.1
        # Note: --locked omitted because the locked time crate version is
        # incompatible with Rust 1.88. Without --locked, cargo resolves a
        # newer compatible time crate.

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install test dependencies
        working-directory: contracts/solana
        run: npm install

      - name: Anchor build
        working-directory: contracts/solana
        run: anchor build

      # `anchor test` runs the [scripts].test against an in-process
      # solana-test-validator (cluster=localnet in Anchor.toml). Its provider
      # wallet (~/.config/solana/id.json, set in Anchor.toml [provider].wallet)
      # is the payer that genesis-airdrops, deploys the program, and funds the
      # relayer/recipient keypairs in the test. That wallet does NOT exist on a
      # fresh runner, so generate one. Throwaway test-only keypair (no real
      # funds, never reused outside this ephemeral CI run).
      - name: Generate test wallet keypair
        run: solana-keygen new --no-bip39-passphrase --silent --no-outdated

      - name: Anchor test
        working-directory: contracts/solana
        run: anchor test
