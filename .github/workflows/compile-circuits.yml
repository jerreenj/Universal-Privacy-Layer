name: Compile ZKP Circuits

on:
  push:
    paths:
      - 'circuits/sources/**'
      - '.github/workflows/compile-circuits.yml'
  workflow_dispatch:  # Manual trigger

jobs:
  compile-circuits:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-action@stable

      - name: Install Circom
        run: |
          git clone https://github.com/iden3/circom.git
          cd circom
          cargo build --release
          sudo mv target/release/circom /usr/local/bin/
          circom --version

      - name: Install snarkjs
        run: npm install -g snarkjs

      - name: Install circomlib
        working-directory: circuits
        run: |
          npm init -y
          npm install circomlib

      - name: Download Powers of Tau
        working-directory: circuits
        run: |
          mkdir -p keys
          wget -q https://hermez.s3-eu-west-1.amazonaws.com/powersOfTau28_hez_final_15.ptau -O keys/pot15.ptau
          echo "✓ Downloaded Powers of Tau (32K constraints)"

      - name: Compile stealth_ownership circuit
        working-directory: circuits
        run: |
          mkdir -p build
          echo "Compiling stealth_ownership..."
          circom sources/stealth_ownership.circom \
            --r1cs --wasm --sym \
            -o build \
            -l node_modules
          echo "✓ Compiled stealth_ownership"

      - name: Compile amount_range circuit
        working-directory: circuits
        run: |
          echo "Compiling amount_range..."
          circom sources/amount_range.circom \
            --r1cs --wasm --sym \
            -o build \
            -l node_modules
          echo "✓ Compiled amount_range"

      - name: Compile membership circuit
        working-directory: circuits
        run: |
          echo "Compiling membership..."
          circom sources/membership.circom \
            --r1cs --wasm --sym \
            -o build \
            -l node_modules
          echo "✓ Compiled membership"

      - name: Generate proving keys
        working-directory: circuits
        run: |
          for circuit in stealth_ownership amount_range membership; do
            if [ -f "build/${circuit}.r1cs" ]; then
              echo "Generating keys for ${circuit}..."
              
              # Phase 1: Setup
              snarkjs groth16 setup \
                "build/${circuit}.r1cs" \
                "keys/pot15.ptau" \
                "keys/${circuit}_0000.zkey"
              
              # Phase 2: Contribute (deterministic for CI)
              echo "CI contribution $(date +%s)" | snarkjs zkey contribute \
                "keys/${circuit}_0000.zkey" \
                "keys/${circuit}_final.zkey" \
                --name="GitHub Actions contribution" \
                -v
              
              # Export verification key
              snarkjs zkey export verificationkey \
                "keys/${circuit}_final.zkey" \
                "keys/${circuit}_vkey.json"
              
              # Generate Solidity verifier
              mkdir -p verifiers
              snarkjs zkey export solidityverifier \
                "keys/${circuit}_final.zkey" \
                "verifiers/${circuit}Verifier.sol"
              
              echo "✓ Generated keys for ${circuit}"
              
              # Cleanup intermediate files
              rm -f "keys/${circuit}_0000.zkey"
            fi
          done

      - name: Generate circuit info
        working-directory: circuits
        run: |
          echo "# ZKP Circuit Compilation Results" > BUILD_INFO.md
          echo "" >> BUILD_INFO.md
          echo "**Built:** $(date -u)" >> BUILD_INFO.md
          echo "**Commit:** ${{ github.sha }}" >> BUILD_INFO.md
          echo "" >> BUILD_INFO.md
          echo "## Compiled Circuits" >> BUILD_INFO.md
          echo "" >> BUILD_INFO.md
          
          for circuit in stealth_ownership amount_range membership; do
            if [ -f "build/${circuit}.r1cs" ]; then
              constraints=$(snarkjs r1cs info "build/${circuit}.r1cs" 2>&1 | grep "Constraints" | awk '{print $3}')
              echo "### ${circuit}" >> BUILD_INFO.md
              echo "- Constraints: ${constraints:-N/A}" >> BUILD_INFO.md
              echo "- R1CS: \`build/${circuit}.r1cs\`" >> BUILD_INFO.md
              echo "- WASM: \`build/${circuit}_js/${circuit}.wasm\`" >> BUILD_INFO.md
              echo "- Proving Key: \`keys/${circuit}_final.zkey\`" >> BUILD_INFO.md
              echo "- Verification Key: \`keys/${circuit}_vkey.json\`" >> BUILD_INFO.md
              echo "- Solidity Verifier: \`verifiers/${circuit}Verifier.sol\`" >> BUILD_INFO.md
              echo "" >> BUILD_INFO.md
            fi
          done
          
          cat BUILD_INFO.md

      - name: Upload compiled circuits
        uses: actions/upload-artifact@v4
        with:
          name: zkp-circuits-${{ github.sha }}
          path: |
            circuits/build/**/*.wasm
            circuits/build/**/*.r1cs
            circuits/build/**/*.sym
            circuits/keys/*_final.zkey
            circuits/keys/*_vkey.json
            circuits/verifiers/*.sol
            circuits/BUILD_INFO.md
          retention-days: 90

      - name: Upload WASM files for frontend
        uses: actions/upload-artifact@v4
        with:
          name: frontend-wasm-${{ github.sha }}
          path: |
            circuits/build/*_js/*.wasm
          retention-days: 90

      - name: Summary
        run: |
          echo "## 🔐 ZKP Circuits Compiled Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts Generated:" >> $GITHUB_STEP_SUMMARY
          echo "- **zkp-circuits-${{ github.sha }}**: Full compilation output (WASM, keys, verifiers)" >> $GITHUB_STEP_SUMMARY
          echo "- **frontend-wasm-${{ github.sha }}**: WASM files for browser proof generation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps:" >> $GITHUB_STEP_SUMMARY
          echo "1. Download artifacts from this workflow run" >> $GITHUB_STEP_SUMMARY
          echo "2. Copy WASM files to \`frontend/public/circuits/\`" >> $GITHUB_STEP_SUMMARY
          echo "3. Deploy generated Solidity verifiers if needed" >> $GITHUB_STEP_SUMMARY
