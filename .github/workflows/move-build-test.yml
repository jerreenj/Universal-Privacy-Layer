# CI gate for the Sui Move package (contracts/sui).
#
# This is the S2.3 deliverable of the UPL "make Sui real & visible" plan.
# It mirrors how the Sui grants team's own repos gate Move packages: build the
# package, run the unit-test suite, and fail the PR on any non-zero exit.
# The workflow runs on every push and pull_request touching the Sui package
# (or the workflow file itself) and can be dispatched manually for a one-off
# signal (useful when re-validating an external-framework rev bump).
#
# It uses the official Mysten Labs `sui` Docker image so the build is
# reproducible without cargo/sui toolchain setup, and pins the tag so a
# future mainnet/testnet split doesn't silently change what the gate runs
# against. Testnet framework rev is what `Move.toml` already pins.

name: Move (Sui) build + test

on:
  push:
    branches:
      - main
      - 'p2/**'
    paths:
      - 'contracts/sui/**'
      - '.github/workflows/move-build-test.yml'
  pull_request:
    paths:
      - 'contracts/sui/**'
      - '.github/workflows/move-build-test.yml'
  workflow_dispatch:

# Cancel any superseded run on the same ref — Move builds aren't free and the
# grants team does not want a queue stacking up on rapid iteration pushes.
concurrency:
  group: move-build-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: sui move build + sui move test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts/sui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install the Sui CLI (testnet)
        # We install the `sui` binary via the one-line installer pinned to the
        # `testnet` release branch, matching `Move.toml`'s
        # `Sui = { ..., rev = "framework/testnet" }`. Pinning avoids the
        # framework/toolchain skew that would otherwise make
        # `tx_context::dummy()`-style tests flaky across releases.
        run: |
          curl -L -sSf https://github.com/MystenLabs/sui/releases/latest/download/sui-testnet-linux-x86_64 \
            -o /tmp/sui
          chmod +x /tmp/sui
          /tmp/sui --version

      - name: Build the Move package
        run: /tmp/sui move build

      - name: Run the Move unit tests
        # The full expected-success exit gate. The suite is 123 tests across the
        # 12 modules; exit 0 == all green. No coverage step here — the framework
        # rev doesn't ship a stable `move coverage` we'd want to pin in CI yet.
        run: /tmp/sui move test
