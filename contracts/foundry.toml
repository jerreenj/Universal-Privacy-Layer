[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.20"
optimizer = true
optimizer_runs = 200

# P3.3: the generated PoseidonT3.poseidon() holds several memory-array locals
# (_c[81], _s[285], _m0..2, _p0..2) round constants/matrices at once — too deep
# for the legacy EVM stack. The compiler's own recommendation is `via_ir`. This
# is the standard setting for Tornado-style Poseidon ports; it's a capability
# superset of the legacy pipeline and produces equivalent bytecode for the
# existing P1 / P2.9.7 contracts (re-verified: all tests still green below).
via_ir = true

# P3.3: DISABLE the IR inliner. PrivacyPool calls PoseidonT3.poseidon ~42x
# (zeros precompute in the ctor + 21/level in _insert). With the inliner ON,
# via_ir folds the ~13KB of PoseidonT3 constants into PrivacyPool at EVERY call
# site, blowing its runtime bytecode past EIP-170's 24576-byte limit (CI runs
# `forge build --sizes`). Turning the inliner off keeps one shared poseidon body
# (called, not duplicated) while still letting via_ir resolve the stack-too-deep.
# This is the documented lever for "library too large to inline" under via_ir.
optimizer_details = { inliner = false }

remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/"
]

# P1.6: allow Deploy.s.sol to write contracts/deployed_base.json after deploy.
# P2.9.7: RedeployRelayer.s.sol also needs to READ the manifest to recover the
# existing stealth_registry address (read access is NOT implied by write).
# The redeploy script does NOT rewrite the manifest inside Forge (it would
# collide with foundry's shared JSON-builder state); that step is post-broadcast.
fs_permissions = [
    {access = "read",  path = "./deployed_base.json"},
    {access = "write", path = "./deployed_base.json"},
    {access = "read",  path = "./scripts/"}
]

# P3.5 fork E2E: PrivacyPoolBaseFork.t.sol uses vm.ffi to invoke
# scripts/prove_withdraw_ffi.js for snarkjs proof generation.
ffi = true

# Snarkjs-generated verifiers are NOT formatted — ignore them from
# `forge fmt --check` to avoid CI failures on every regeneration.
# NOTE: the correct key is `ignore` (Foundry 1.7+). The prior `exclude`
# key was never recognized — forge warned "Found unknown `exclude` config
# key" and the verifiers were silently NOT excluded, which is why
# test_forge_fmt_clean kept failing on ConfidentialNotesVerifier.sol.
[fmt]
ignore = [
    "src/ConfidentialNotesVerifier.sol",
    "src/SpendVerifier.sol",
    "src/ConfidentialTransferVerifier.sol",
    "src/Verifier.sol",
    "src/PoseidonT3.sol",
]

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
