[package]
name = "upl"
version = "0.1.0"
# Universal Privacy Layer — Sui Move package.
#
# Pulled forward from the project's Phase-2 plan in response to the Sui grants
# team review (2026-06) flagging that the repo was EVM-only despite the README
# advertising Sui/MoveVM. These modules are real, compiling privacy primitives
# ported from the EVM contracts in ../  + Sui-native extensions. Testnet
# deployable via scripts/deploy_sui_testnet.sh.
edition = "2024"

[addresses]
# Replaced with the publisher address at `sui client publish`. The placeholder
# 0x0 is mandated by the Sui toolchain for unpublished packages.
upl = "0x0"

[dependencies]
# The Sui framework + Move stdlib are referenced via the `[env]` of `sui move
# build` (auto-discovered when building with the `sui` CLI). Listing them here
# keeps the manifest self-describing for tooling that resolves deps explicitly.
Sui = { git = "https://github.com/MystenLabs/sui.git", subdir = "crates/sui-framework/packages/sui-framework", rev = "framework/testnet" }

[dev-dependencies]
# Tests live in tests/*.move and use #[test_only] / #[test] attributes from the
# Move stdlib only; no extra dev-deps required. This block exists so future
# fuzz/bench tooling has a documented slot.
