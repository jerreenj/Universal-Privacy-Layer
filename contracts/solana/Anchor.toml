[programs.localnet]
upl_sol = "F7MQRA15YwswZoLK319rs1sr35Km2KBfqvPgR7TPnp1t"

[programs.devnet]
upl_sol = "F7MQRA15YwswZoLK319rs1sr35Km2KBfqvPgR7TPnp1t"

[registry]
